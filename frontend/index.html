<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HireMeAI</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-name">HireMeAI</div>
      <div class="logo-sub">PORTFOLIO AGENT · v1.0</div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" data-page="chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
      <a class="nav-item" data-page="ingest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        Ingest
      </a>
      <a class="nav-item" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a class="nav-item" data-page="about">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        About &amp; Docs
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name">Ubaid Ali Khan</div>
          <div class="user-role">Data Scientist · AI Engineer</div>
        </div>
      </div>
      <a class="nav-item" href="https://github.com/ubaidxai/HireMeAI" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.835 2.807 1.305 3.492.998.108-.775.418-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/>
        </svg>
        GitHub
      </a>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-breadcrumb">HireMeAI</span>
        <span style="color:var(--text-muted);font-size:14px">/</span>
        <span id="breadcrumb" class="page-breadcrumb" style="color:var(--text-secondary)">Chat</span>
      </div>
      <div class="topbar-right">
        <div class="status-pill">
          <div class="status-dot"></div>
          API HEALTHY
        </div>
        <button class="icon-btn" title="Notifications">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <button class="icon-btn" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>

          </svg>
        </button>
      </div>
    </header>

    <!-- Page content injected here -->
    <div id="page-area" class="page-area" style="transition:opacity 0.15s ease"></div>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
